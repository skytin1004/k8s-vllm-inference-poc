apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: llm-inference-poc
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HUB_DISABLE_XET
              value: "1"
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - Qwen/Qwen2.5-0.5B-Instruct
            - --served-model-name
            - qwen2.5-0.5b-instruct
            - --max-model-len
            - "1024"
            - --enforce-eager
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 6Gi
              # Enable the cluster-specific GPU resource key here when available.
              # Example placeholder:
              # devices.example/gpu: "1"
